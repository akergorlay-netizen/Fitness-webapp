<!DOCTYPE html>
<html>
<head>
  <title>Mon App Fitness</title>
  <!-- Scripts Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="script.js" defer></script>
  <style>
    body { font-family: Arial; text-align: center; }
    .muscle { margin: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px; }
    .rank { padding: 5px 10px; border-radius: 10px; color: white; }
  </style>
</head>
<body>
  <h1>Mon Avatar Fitness</h1>
  <div id="auth">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Mot de passe" />
    <button onclick="signUp()">S'inscrire</button>
    <button onclick="logIn()">Se connecter</button>
  </div>
  <div id="app" style="display: none;">
    <h2>Bienvenue <span id="user-email"></span> !</h2>
    <div id="muscles"></div>
  </div>
</body>
</html>
